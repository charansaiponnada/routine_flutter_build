name: forge_routine
description: CSP's discipline & GATE prep tracker
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_hooks: ^0.20.5

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  percent_indicator: ^4.2.3
  animate_do: ^3.3.4
  confetti: ^0.7.0
  url_launcher: ^6.2.5

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  path_provider: ^2.1.4
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
